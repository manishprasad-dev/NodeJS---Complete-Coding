<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e1e2f 0%, #2b2b45 100%);
    color: #f4f4f4;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }

  .container {
    padding: 2rem;
  }

  h1 {
    font-size: 8rem;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #7f5af0, #2cb67d);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  h2 {
    font-size: 1.8rem;
    font-weight: 500;
    margin-bottom: 1rem;
    color: #f4f4f4;
  }

  p {
    font-size: 1.1rem;
    color: #b8b8c8;
    margin-bottom: 2rem;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  a.home-link {
    display: inline-block;
    padding: 0.8rem 2rem;
    background: linear-gradient(90deg, #7f5af0, #2cb67d);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  a.home-link:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(127, 90, 240, 0.4);
  }

  .icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.8;
  }

  @media (max-width: 480px) {
    h1 { font-size: 5rem; }
    h2 { font-size: 1.3rem; }
    p { font-size: 1rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">🔍</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Sorry, the page you're looking for doesn't exist or may have been moved.</p>
    <a href="http://localhost:3002/" class="home-link">Back to Home</a>
  </div>
</body>
</html>
