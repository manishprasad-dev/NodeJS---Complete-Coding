<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.85;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid rgba(255,255,255,0.6);
            padding: 8px 18px;
            border-radius: 8px;
            transition: all 0.25s ease;
        }

        .back-link:hover {
            background: #fff;
            color: #764ba2;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .product-card {
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.3);
        }

        .product-icon {
            font-size: 42px;
            margin-bottom: 14px;
        }

        .product-card h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .product-card .price {
            color: #667eea;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 14px;
        }

        .product-card button {
            background: #667eea;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.25s ease;
        }

        .product-card button:hover {
            background: #4b3f9e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Our Products</h1>
        <p>Browse through our featured collection</p>
        <a href="/" class="back-link">&larr; Back to Home</a>
    </div>

    <div class="product-grid">
        <div class="product-card">
            <div class="product-icon">🎧</div>
            <h3>Wireless Headphones</h3>
            <div class="price">$59.99</div>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-icon">⌚</div>
            <h3>Smart Watch</h3>
            <div class="price">$89.99</div>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-icon">💻</div>
            <h3>Laptop Stand</h3>
            <div class="price">$24.99</div>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-icon">🖱️</div>
            <h3>Wireless Mouse</h3>
            <div class="price">$18.49</div>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-icon">🔌</div>
            <h3>USB-C Hub</h3>
            <div class="price">$32.99</div>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <div class="product-icon">📷</div>
            <h3>Webcam HD</h3>
            <div class="price">$45.00</div>
            <button>Add to Cart</button>
        </div>
    </div>
</body>
</html>
