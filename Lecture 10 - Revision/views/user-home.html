<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            padding: 50px 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #777;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .nav-list li a {
            display: block;
            text-decoration: none;
            background: #f4f4f9;
            color: #4b3f72;
            font-weight: 600;
            font-size: 16px;
            padding: 14px 20px;
            border-radius: 10px;
            transition: all 0.25s ease;
            border: 2px solid transparent;
        }

        .nav-list li a:hover {
            background: #667eea;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome Home</h1>
        <p class="subtitle">Click a link below to navigate</p>

        <ul class="nav-list">
            <li><a href="user/products">Products</a></li>
            <li><a href="user/about">About</a></li>
            <li><a href="user/contact">Contact</a></li>
            <li><a href="admin/add-products-adminrouter">Add Products (Admin)</a></li>
            <li><a href="admin/delete-products-adminrouter">Delete Products (Admin)</a></li>
        </ul>
    </div>
</body>
</html>
