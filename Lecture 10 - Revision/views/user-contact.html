<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            padding: 50px 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            max-width: 480px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 30px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #777;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #444;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0ec;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.25s ease;
        }

        input:focus,
        textarea:focus {
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            background: #667eea;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.25s ease;
        }

        button:hover {
            background: #4b3f9e;
        }

        .info {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.8;
        }

        .back-link {
            display: block;
            margin-top: 24px;
            text-align: center;
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <p class="subtitle">We'd love to hear from you</p>

        <form>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <div class="info">
            📍 123 Main Street, Dhanbad, JH<br>
            📧 support@example.com<br>
            📞 +91 98765 43210
        </div>

        <a href="/" class="back-link">&larr; Back to Home</a>
    </div>
</body>
</html>
